<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정규식</title>
    <script>
        /*
            정규식
            문자열에서 특정한 패턴을 찾거나, 검사하거나, 치환하기 위해 사용하는 표현식 //반복문을 이용하지 않고 찾을 수 있음

            /패턴/옵션 // 변수에 담아
            또는
            new RegExp("패턴","옵션") //객체 만드는 방식

            패턴
            a: 문자 a //a를 찾아주겠다
            abc: abc문자열

            .: 아무 문자 1개
            [abc]: a또는 b또는 c
            [a-z]: a부터 z. 영어
            [가-힣]: 모든 한글
            [0-9]: 숫자

            [^0-9]: 숫자가 아닌 문자
            *: 0번 이상
            +: 1번 이상
            ?: 0 또는 1
            {n}: 정확히 n번
            {n,}: n번 이상
            {n,m}: n~m번
            ^: 문자열 시작 의미
            $: 문자열 끝
            \d: 숫자
            \D: 숫자 아님
            \w: 문자 또는 숫자 또는 _
            \W: 문자 또는 숫자 또는 _ 외의 문자
            \s: 공백
            \S: 공백 아닌 문자
            g: 전체 검색
            i: 대소문자 무시
            m: 여러 줄 처리

            test(): 패턴 존재 여부

                const reg = /^[0-9]+/   //문자열이 1개 이상 숫자로 시작해 숫자로 끝나야함
                reg.test("a123") // false  //숫자로 시작 안해 패턴에 맞지 않음
                reg.test("1234") // true

            match(): 일치 결과 반환
                "abc123".match(/\d+/) //숫자 1개 이상 // ["123"]

            replace(): 치환
                "010-1234-5678".replace(/-/g,"") // -을 전체 검색한 후 ""으로 대체 즉 없앰 // 01012345678
            
            search(): 위치 반환
                "hello.search(/e/) //1"


        */
    </script>
</head>

<body>
    <button id="checkBtn">검사하기</button>
    <script>
        document.getElementById("checkBtn").addEventListener("click",function(){
            const email = "apple@apple.com"
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            // 공백도 @도 아닌 것으로 시작, 여러 개 올 수 있고 그 뒤에 @이 와야함. 그 뒤에 .이 와야하고, 다시 공백 @ 없는 문자열이 1개 이상 오고 끝나야함.
            console.log("이메일 검사: ", emailRegex.test(email))

            const phone = "010-1234-5678"
            const phoneRegex = /^010-\d{3,4}-\d{4}$/
            console.log("휴대폰 번호 검사:", phoneRegex.test(phone))
        })
    </script>

</body>

</html>
