<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클래스</title>
    <script>
        /*
            class 클래스명 {
                constructor(매개변수1, 매개변수2 ...){
                    속성 정의
                }
                
                메서드명(매개변수1, 매개변수2 ...){
                    객체가 할 수 있는 동작 정의
                }
            }

            클래스 상속
            - 다른 클래스의 속성과 메서드를 물려받을 수 있음
                class 클래스명 extends 부모클래스명 {

                }

            정적 메서드
            - 클래스 이름으로 직접 호출하는 메서드

            클래스 필드
            - constructor 없이 속성을 바로 정의 가능
            - 클래스 레벨 속성, 비공개 속성 정의에 유리함

            get/set
            - get과 set은 같은 이름을 공유해야 함
            - 내부에서 값을 저장할 땐 보통 _name처럼 언더스코어를 붙여서 구분
            - get만 정의하면 읽기 전용 속성이 됨

            private 필드
            - 클래스 내부에서만 접근 가능한 비공개 속성
            - #을 붙이면 반드시 동일한 클래스 안에서만 접근 가능

        */
    </script>
</head>

<body>
    <h1>클래스</h1>
    <script>
        class Animal{
            constructor(type){ //생성자 함수
                this.type = type
            }
            bark(){
                console.log(`${this.type} 멍멍!`)
            }
            speak(){
                console.log("동물이 소리를 냅니다")
            }
        }

        const dog = new Animal("강아지")
        console.log(dog.type)
        dog.bark()


        class Dog extends Animal{
            constructor(type,color){ //overriding
                super(type) // 부모 생성자 호출 animal의 constructor 호출
                this.color = color
            }

            speak(){ //오버라이딩
                console.log("멍멍!")
            }

            showInfo(){
                console.log(`${this.type}는 ${this.color} 입니다`)
            }
        }

        const rucy = new Dog("강아지","흰색")
        rucy.speak()
        rucy.bark()
        rucy.showInfo()

    </script>
    <hr>
    <h1>정적 메서드</h1>
    <script>
        class MathTool { //클래스명으로 접근하는 메서드. 객체 생성 필요 없음
            static add(a,b){
                return a + b
            }
        }

        console.log(MathTool.add(3,4))

    </script>
    <hr>
    <h1>클래스 필드</h1>
    <script>
        class Product{
            name = "상품명 없음"
            price = 0

            showInfo(){
                console.log(`${this.name}의 가격은 ${this.price}원입니다.`) //파이썬과 달리 this로 접근이 가능함
                //내부에서 생성자 없이 편하게 접근하기 위해 생김
            }
        }
    </script>
    <hr>
    <h1>get / set</h1>
    <script>
        class User{
            #password = "" //private 필드 생성 후 초기화

            constructor(name,password){
                this._name = name
                this.#password = password //private 필드는 constructor가 아닌 클래스 단에서 만들어야 함
            }

            get name(){
                return this._name
            }

            set name(newName){
                if(newName.length < 2){
                    console.log("이름은 두 글자 이상이어야 합니다.")
                }else{
                    this._name = newName
                }
            }

            checkPassword(input){
                return this.#password == input
            }
        }

        const user = new User("김사과", "1111")
        console.log(user)
        user.name="반"
        user.name = "반하나"
        console.log(user.name)
        console.log(user.checkPassword("1111"))
        console.log(user.checkPassword("1234"))

        //console.log(user.#password) 외부에서 접근 불가능해 error남
    </script>

    <hr>
    <h1>Account 클래스</h1>
    <script>
        class Account{
            static accountCount = 0 //파이썬의 클래스 변수같은. 공용으로 모든 인스턴스가 사용가능

            #balance = 0 //외부 접근 불가

            constructor(owner){
                this.owner = owner
                Account.accountCount++
            }

            get balance(){
                return this.#balance
            }

            set balance(value){
                console.log("직접 잔액을 설정할 수 없습니다.")
            }

            deposit(amount){
                if(amount>0){
                    this.#balance += amount
                    console.log(`${this.owner}님, ${amount}원 입금되었습니다.`)
                }
            }

            withdraw(amount){
                if(amount<=this.#balance){
                    this.#balance-=amount
                    console.log(`${this.owner}님, ${amount}원 출금되었습니다.`)
                }else{
                    console.log(`잔액이 부족합니다.`)
                }
            }

            static getAccountCount(){
                return `총 계좌 수: ${Account.accountCount}`
            }
        }

        const user1 = new Account("김사과")
        user1.deposit(1000)
        console.log(user1.balance)

        user1.balance = 5000
        console.log(user1.balance)

        user1.withdraw(300)

        const user2 = new Account("반하나")
        user2.deposit(6000)

        console.log(Account.getAccountCount())
    </script>
</body>

</html>
