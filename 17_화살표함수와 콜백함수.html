<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화살표 함수와 콜백 함수</title>
    <script>
        /*
            자바스크립트에서 this가 바뀌는 문제
            - this가 선언 시점이 아니라 "호출되는 방식"에 따라 결정
            - 같은 함수라도 어떻게 호출하느냐에 따라 this가 전혀 다른 대상을 가리킬 수 있음

            화살표 함수
            - function 키워드 대신 => 기호를 사용하여 함수를 더 간결하게 작성하는 방법
            - ES6부터 도입된 문법으로 코드를 짧게 만들고, this 바이팅 문제를해결
                const func1 = () => {console.log("실행")}
                const func2 = (a,b) => {return a + b}
                const func3 =  x => {return x*x}
                const func4 = (a,b) => a+b //반환값 없음
                const func5 = (a.b) => ({a,b}) //객체로 반환
            //바인딩을 잘해줄 수 있음

            동기(Synchronous)
            - 동기는 작업이 순서대로 하나씩 실행되는 방식
            - 앞에 있는 작업이 끝나야 다음 작업을 실행

            비동기(Asynchronous)
            - 느린 작업을 기다리지 않고, 나중에 따로 실행될 작업은 뒤로 미뤄놓고 다음 코드부터 먼저 실행하는 방식
            - 기본적으로 한 줄씩 처리하는 단일 스레드 언어(jS) 모든 작업을 동기로 처리하면, 느린 작업이 있으면 전체 프로그램이 멈추게 됨 (js는 병렬처리 불가)
            - 비동기가 필요한 작업
                - 서버에서 데이터 가져오기
                - 파일 읽기
                - 이미지 로딩
                - 타이머, 사용자 이벤트 등
            //시간 오래 걸리는 작업 맡길 수 있음 맡겨놓고 다음 작업으로 넘어감(큐)

            콜백 함수
            - 다른 함수의 인자로 전달되어, 그 함수 내부에서 나중에 호출되는 함수
            - 어떤 작업이 끝난 후 실행되어야 할 코드를 함수로 전달해두는 방식
            - 비동기 처리나 배열 메서드에서 자주 사용됨
            - 일반 함수나 화살표 함수(권장) 모두 콜백 함수로 사용할 수 있음



        */
    </script>
</head>

<body>
    <script>
        //브라우저 환경 : this === window, 일반 함수 호출은 전역 객체를 가리킴
        function show() {
            console.log(this)
        }
        show()

        // this === obj, 점 앞의 객체가 this가 됨
        const obj1 = {
            name: "김사과",
            show() {
                console.log(this.name)
            }
        }
        obj1.show()

        // 콜백 함수를 호출하면 this가 바뀌는 문제가 발생
        // setTimeout 안에 함수는 일반 함수 호출 -> this === window
        const obj2 = {
            name: "김사과",
            show() {
                setTimeout(function () {
                    console.log(this.name) //김사과 아님 undefined
                }, 1000)
            }
        }
        console.log("obj2")
        obj2.show()

        // 화살표 함수
        const obj3 = {
            name: "김사과",
            show() {
                setTimeout(() => {
                    console.log(this.name) //김사과
                }, 1000)
            }
        }
        console.log("obj3")
        obj3.show()

        // 콜백 함수
        function greet(name,callback){ //callback에 함수 주소가 들어옴
            console.log("안녕, "+ name + "!")
            callback() //실행
        }

        function sayBye(){
            console.log("바이 ~")
        }

        greet("김사과",sayBye)

        const numbers = [1,2,3,4]
        const doubled = numbers.map(n => n*2) // n => n*2 콜백 함수 (화살표 함수로 만들어 넣음)
        console.log(doubled)

        function doSomething(callback){
            console.log("작업 시작!")
            callback()
        }

        doSomething(() => {
            console.log("작업 완료!") //익명함수 한 번 실행 후 메모리에서 사라짐. 이벤트에서 사용하기 좋음. 많이 쓰는 방법.
        })

        const calc_add = (a,b) => a + b
        const calc_multiply = (a,b) => a * b

        function calculator(num1,num2,action){
            if(num1<0 || num2<0) return //아무 것도 반환 안하고 함수 종료
            const result = action(num1,num2) // 전달받은 주소 따라가 실행하라
            return result

        }

        console.log(calculator(10,3,calc_add))
        console.log(calculator(10,3,calc_multiply))
    </script>

</body>

</html>
