<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM</title>
    <script>
        /*
            BOM(Browser Object Model)
            자바스크립트가 브라우저 자체를 제어하고 정보를 얻기 위해 사용하는 객체 모델
            //비표준. 모든 브라우저에서 이 api 제대로 작동할 보장은 없음 - 확인 필요
            // 내부에 브라우저 제어 api 존재

            API(Application Programming Interface)
            서로 다른 프로그램이나 시스템이 데이터를 주고받고 기능을 사용할 수 있도록 연결해주는 중간 통로
            //브라우저 자체가 허용해 놓은 통로

            1. window 객체
            - 자바스크립트에서 브라우저 창을 대표하는 최상위 객체로, 전역 범위에서 정의된 변수나 함수, 타이머, 팝업, 브라우저 정보 등 대부분의 기능을 포함하고 있음
            - HTML 페이지를 로드하면 브라우저는 자동으로 window 객체를 생성하며, 자바스크립트 코드에서 명시적으로 window를 쓰지 않아도 사용할 수 있음

            2. location 객체
            - 자바스크립트에서 현재 웹 페이지의 URL(주소) 정보를 다루고 제어할 수 있게 해주는 window 객체의 하위 객체

            3. history 객체
            - 브라우저의 방문 기록을 제어할 수 있는 객체로, 사용자가 이전에 방문했던 페이지로 이동하거나 앞으로 다시 이동할 수 있는 기능을 제공

            4. navigator 객체
            - 브라우저에 대한 정보를 제공하는 객체로, 사용자의 브라우저 종류, 버전, 운영체제, 언어 설정, 온라인 여부 등 다양한 환경 정보를 확인할 수 있도록 해줌 //보안 상 이유로 실제 정보를 그대로 보여주지 않기도 함
            - geolocation: 사용자의 위치 정보를 가져오기 위한 API로, GPS, WIFI, IP 주소 등을 이용해 현재 위치를 알아냄. 사용자의 명시적인 동의가 있어야 작동함


        */
    </script>
</head>

<body>
    <button onclick="reloadPage()">페이지 새로고침</button> <!--호이스팅 적용됨-->
    <button onclick="goToNaver()">네이버로 이동</button>
    <button onclick="showLocationInfo()">주소 정보 보기</button>

    <hr>

    <button onclick="goBack()">뒤로가기</button>
    <button onclick="goForward()">앞으로가기</button>
    <button onclick="showHistoryLength()">방문 기록 개수</button>

    <hr>

    <button onclick="showNavigatorInfo()">브라우저 정보 보기</button>

    <hr>

    <p id="locationInfo">위치 정보가 여기에 표시됩니다.</p>
    <button onclick="getLocation()">위치 가져오기</button>

    <script>
        function showWindowInfo(){
            console.log("브라우저 이름",window.navigator.appName)//윈도우 객체 안에 내비게이터 객체 안에 appName 속성(프로퍼티)
            console.log("브라우저 엔진",window.navigator.product)
            console.log("사용자 에이전트",window.navigator.userAgent)//userAgent 정보가 실제로 전달됨
            console.log("현재 페이지 URL: ",window.location.href) //내가 보고 있는 페이지
            console.log("창 너비: ",window.innerWidth) //윈도우에 바로 있는 속성
            console.log("창 높이: ",window.innerHeight)

            window.setTimeout(function(){
                window.alert("3초가 지났습니다!")//화면에 알람창을 보여줌
            },3000)//윈도우에 바로 있는 메서드
            // 실행된 후 지정 초가 지나면 함수를 콜백해서 호출해줌
            //단위 mili sec
            //window 전부 생략 가능함
        }

        function showLocationInfo(){
            console.log("전체 URL: ", location.href)
            console.log("프로토콜: ", location.protocol)
            console.log("호스트: ", location.host) // 도메인 포트 포함
            console.log("호스트명: ", location.hostname) //도메인, ip
            console.log("포트번호: ", location.port)
            console.log("경로: ", location.pathname) // 호스트 제외한 나머지 경로
            console.log("쿼리 문자열: ", location.search)// http://127.0.0.1:5500/15_BOM.html?userid=apple 쿼리 문자열에 ?userid=apple 들어감. url 통해 전달해야 하는 값이 표시됨. 현 페이지에서 담 페이지로 넘겨주고 싶은 값을 쿼리를 통해 url에 담아 전달함.
            
        }

        function reloadPage(){
            location.reload()

        }

        function goToNaver(){
            location.href = "https://naver.com"
        }

        function goBack(){
            history.back()
        }

        function goForward(){
            history.forward()
        }

        function showHistoryLength(){
            alert("방문 기록 수: "+history.length)
        }

        function showNavigatorInfo(){
            console.log("브라우저 이름(userAgent): ",navigator.userAgent) //봇 여부 확인에 쓰임
            console.log("운영체제: ",navigator.platform)
            console.log("언어 설정: ",navigator.language)
            console.log("쿠키 사용 가능 여부: ",navigator.cookieEnabled) // 서버가 브라우저에 저장을 함. 텍스트 파일로 심어둠(기록). 서버가 사용자의 편의성을 위해. 사용자가 거부 가능, 기록을 삭제할 수 있음.
        }

        function getLocation(){
            if (navigator.geolocation){ //혹시라도 gps가 작동하지 않을까봐.
                navigator.geolocation.getCurrentPosition(showPosition,showError) // 위도,경도 에러 받아올 변수 넣은 것. 콜백으로 등록
            }

            else{
                document.getElementById("locationInfo").innerText = "이 브라우저는 위치 정보를 지원하지 않습니다."//document -브라우저의 body 객체 관리
            }
        }

        function showPosition(position){ //알아서 position으로 들어옴
            const latitude = position.coords.latitude
            const longitude = position.coords.longitude
            document.getElementById("locationInfo").innerText = `위도: ${latitude}, 경도:${longitude}`
        }

        function showError(error){
            switch(error.code){
                case error.PERMISSION_DENIED:
                    alert("사용자가 위치 정보 제공을 거부했습니다.")
                    break
                case error, POSITION_UNAVAILABLE:
                    alert("위치 정보를 사용할 수 없습니다.")
                case error.TIMEOUT:
                    alert("위치 정보를 가져오는 데 시간이 초과되었습니다.")
                default:
                    alert("알 수 없는 오류가 발생했습니다.")
            }
        }

        // showWindowInfo()
        // showLocationInfo()
    </script>

</body>

</html>
